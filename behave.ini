[behave]
# Default paths
paths = features/test

# Stdout capture — disable to see print() output during runs
stdout_capture = false
stderr_capture = false

# Stop on first failure
stop = false

# Default format
format = pretty

# Tags to exclude from default runs
# tags = ~@wip ~@skip

# Allure output dir (used when running with allure formatter)
# behave -f allure_behave.formatter:AllureFormatter -o allure-results features/test/
